# Flinq dev overrides.
# Use together with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  app-api:
    build:
      target: dev
    environment:
      FLINQ_ENV: dev
      FLINQ_LOG_LEVEL: DEBUG
    volumes:
      - ./backend:/app/backend
    command: ["uv", "run", "uvicorn", "flinq.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/backend/src"]

  app-worker:
    build:
      target: dev
    environment:
      FLINQ_ENV: dev
      FLINQ_LOG_LEVEL: DEBUG
    volumes:
      - ./backend:/app/backend
    command: ["uv", "run", "taskiq", "worker", "flinq.worker.broker:broker", "--reload"]

  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    command: ["sh", "-c", "corepack enable && pnpm install && pnpm dev --host 0.0.0.0"]